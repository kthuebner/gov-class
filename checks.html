<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checks &amp; Balances</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Serif+4:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --parchment:      #f0f0f0;
  --parchment-dark: #d8d8d8;
  --ink:            #1c1a14;
  --ink-mid:        #3a3628;
  --gold:           #b8882a;
  --leg:   #3d6b35;
  --leg-bg:#eaf2e8;
  --leg-bd:#b8d4b3;
  --exe:   #c8783a;
  --exe-bg:#fdf2ea;
  --exe-bd:#e8c49a;
  --jud:   #6b3a8a;
  --jud-bg:#f2eaf7;
  --jud-bd:#c9a8de;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--parchment); font-family: 'Source Serif 4', Georgia, serif; color: var(--ink); min-height: 100vh; }
header { text-align: center; padding: 1.5rem 1.5rem 1rem; border-bottom: 2px solid var(--parchment-dark); }
.eyebrow { font-family: 'Oswald', sans-serif; font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
h1 { font-family: 'Oswald', sans-serif; font-size: clamp(1.7rem, 4vw, 2.8rem); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink); line-height: 1; }
.subtitle { font-style: italic; font-size: 0.9rem; color: var(--ink-mid); opacity: 0.6; margin-top: 0.3rem; }

/* MODE TOGGLE */
.mode-bar { display: flex; justify-content: center; gap: 0; margin-top: 1rem; }
.mode-btn {
  font-family: 'Oswald', sans-serif; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.45rem 1.6rem;
  border: 2px solid var(--ink-mid);
  background: var(--parchment); color: var(--ink-mid);
  cursor: pointer; transition: background 0.18s, color 0.18s;
}
.mode-btn:first-child { border-radius: 6px 0 0 6px; border-right: 1px solid var(--ink-mid); }
.mode-btn:last-child  { border-radius: 0 6px 6px 0; border-left:  1px solid var(--ink-mid); }
.mode-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.hint { margin-top: 0.55rem; font-family: 'Oswald', sans-serif; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); opacity: 0.85; }

.legend { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; padding: 0.65rem 1rem; border-bottom: 1px solid var(--parchment-dark); }
.legend-item { display: flex; align-items: center; gap: 0.45rem; font-family: 'Oswald', sans-serif; font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-mid); }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

.diagram-outer { max-width: 1000px; margin: 1.5rem auto 0; padding: 0 1rem; }
.diagram-outer svg { width: 100%; height: auto; display: block; }

/* Node cards (inside foreignObject) */
.node-card {
  border-radius: 12px; border: 2px solid; text-align: center;
  padding: 10px 8px 10px; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.node-card.leg { background: var(--leg-bg); border-color: var(--leg-bd); }
.node-card.exe { background: var(--exe-bg); border-color: var(--exe-bd); }
.node-card.jud { background: var(--jud-bg); border-color: var(--jud-bd); }
.node-img { width: 100px; height: 75px; object-fit: cover; border-radius: 5px; display: block; margin: 0 auto 5px; }
.node-title { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.15; }
.node-card.leg .node-title { color: var(--leg); }
.node-card.exe .node-title { color: var(--exe); }
.node-card.jud .node-title { color: var(--jud); }
.node-sub { font-size: 13px; font-style: italic; opacity: 0.75; font-weight: 600; }

/* DETAIL PANEL */
.detail-panel { max-width: 1000px; margin: 1.5rem auto 3rem; padding: 0 1.5rem; display: none; }
.detail-panel.open { display: block; }
.detail-card { border-radius: 10px; border: 2px solid; padding: 1.4rem 1.8rem 1.6rem; position: relative; animation: fadeUp 0.25s ease; }
.detail-card.leg { background: var(--leg-bg); border-color: var(--leg-bd); }
.detail-card.exe { background: var(--exe-bg); border-color: var(--exe-bd); }
.detail-card.jud { background: var(--jud-bg); border-color: var(--jud-bd); }
.detail-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 8px 8px 0 0; }
.detail-card.leg::before { background: var(--leg); }
.detail-card.exe::before { background: var(--exe); }
.detail-card.jud::before { background: var(--jud); }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
.detail-label { font-family: 'Oswald', sans-serif; font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.5; margin-bottom: 0.2rem; }
.detail-title { font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.15; }
.detail-card.leg .detail-title { color: var(--leg); }
.detail-card.exe .detail-title { color: var(--exe); }
.detail-card.jud .detail-title { color: var(--jud); }
.close-btn { background: none; border: 1.5px solid rgba(28,26,20,0.2); border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 0.8rem; color: var(--ink-mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.close-btn:hover { background: var(--parchment-dark); }
.detail-body { font-size: 0.88rem; line-height: 1.72; color: var(--ink-mid); }
.detail-body p { margin-bottom: 0.55rem; }
.detail-body p:last-child { margin-bottom: 0; }
.detail-body strong { color: var(--ink); }
.callout { margin-top: 0.7rem; padding: 0.55rem 0.9rem; background: rgba(184,136,42,0.08); border-left: 3px solid var(--gold); border-radius: 0 5px 5px 0; font-size: 0.82rem; font-style: italic; color: var(--ink-mid); }

/* QUIZ FEEDBACK */
.quiz-msg { max-width: 1000px; margin: 1rem auto 0; padding: 0.6rem 1.5rem; min-height: 2.2rem; text-align: center; font-family: 'Oswald', sans-serif; font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase; display: none; border-radius: 6px; }
.quiz-msg.open { display: block; }
.quiz-msg.correct { color: var(--leg); background: var(--leg-bg); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">BVA &middot; American Government &middot; Units 2, 4, 5 &amp; 6</div>
  <h1>Checks &amp; Balances</h1>
  <p class="subtitle">How each branch limits the power of the others</p>
  <div class="mode-bar">
    <button class="mode-btn active" id="btnLearn" onclick="setMode('learn')">&#128214;&nbsp; Learn</button>
    <button class="mode-btn" id="btnQuiz" onclick="setMode('quiz')">&#9997;&nbsp; Quiz Me</button>
  </div>
  <p class="hint" id="hintText">&#8595; Click any arrow to explore that check in depth</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--leg)"></div>Legislative (Congress)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--exe)"></div>Executive (President)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--jud)"></div>Judicial (Supreme Court)</div>
</div>

    body:'<p><strong>How it works:</strong> Congress can impeach and remove federal judges, including Supreme Court justices. The same two-step process applies — House majority to impeach, Senate ⅔ to convict.</p><p>Fifteen federal judges have faced impeachment in U.S. history; eight were convicted and removed. No Supreme Court justice has ever been removed, though Associate Justice Samuel Chase was impeached by the House in 1804 and acquitted by the Senate in 1805.</p><div class="callout">A federal judge’s lifetime tenure is a protection of judicial independence — not a shield from accountability. Congress retains the ultimate check.</div>'
  },
  'leg-exe-override': {
    owner:'leg',
    label:'Legislative Branch → Executive Branch',
    title:'Override of the Presidential Veto',
    body:'<p><strong>How it works:</strong> If the President vetoes a bill, Congress can override with a <strong>⅔ supermajority in both chambers</strong> — at least 290 House members and 67 senators. The bill then becomes law without the President’s signature.</p><p>Overrides are rare — fewer than 10% of vetoes in U.S. history have been overridden. <strong>Andrew Johnson</strong> holds the record: 15 of his 29 vetoes were overridden by a Reconstruction-era Congress determined to direct policy over his objections.</p><div class="callout">The mere threat of an override shapes presidential decision-making. Presidents often negotiate changes to legislation before it reaches their desk to avoid a veto showdown they might lose.</div>'
  },
  'leg-jud-confirm': {
    owner:'leg',
    label:'Legislative Branch → Judicial Branch',
    title:'Senate Confirms Federal Judges',
    body:'<p><strong>How it works:</strong> Every federal judge — including all nine Supreme Court justices — must be confirmed by a Senate majority vote. Historically, the Senate deferred to presidential nominees who were professionally qualified, even if ideologically different from the majority. That norm has eroded significantly.</p><p>A rules change in 2017 eliminated the 60-vote filibuster threshold for Supreme Court nominees, meaning a simple majority now suffices. This allowed confirmations of Justices Gorsuch, Kavanaugh, and Barrett along near-party-line votes.</p><div class="callout">Because justices serve for life, a single confirmation can shape constitutional law for 30–40 years — making these votes among the most consequential the Senate ever casts.</div>'
  },
  'exe-leg-veto': {
    owner:'exe',
    label:'Executive Branch → Legislative Branch',
    title:'Presidential Veto',
    body:'<p><strong>How it works:</strong> The President has <strong>10 days</strong> to sign or veto a bill passed by Congress. A veto returns the bill with a written objection. The <strong>pocket veto</strong> occurs when Congress adjourns within that 10-day window — the bill dies automatically and cannot be overridden.</p><p>In 2025, President Trump vetoed a bipartisan Senate resolution to terminate his national emergency declaration underpinning Canada tariffs — and the Senate fell short of the votes needed to override.</p><div class="callout">FDR holds the record with 635 vetoes. Even the credible threat of a veto shapes legislation — bills are often revised before passage to avoid one.</div>'
  },
  'exe-jud-nominate': {
    owner:'exe',
    label:'Executive Branch → Judicial Branch',
    title:'President Nominates Federal Judges',
    body:'<p><strong>How it works:</strong> The President nominates all Article III federal judges — district courts, circuit courts, and the Supreme Court. Nominees take effect only after Senate confirmation, and they serve lifetime appointments during “good behavior.”</p><p>During his first term, President Trump appointed <strong>three Supreme Court justices</strong> — Neil Gorsuch (2017), Brett Kavanaugh (2018), and Amy Coney Barrett (2020) — along with 234 federal judges total, giving conservatives a strong majority across the federal judiciary.</p><div class="callout">Trump’s three SCOTUS picks form part of the current 6–3 conservative majority and will likely serve well into the 2040s and 2050s — one of the most enduring legacies of any modern presidency.</div>'
  },
  'jud-leg-review': {
    owner:'jud',
    label:'Judicial Branch → Legislative Branch',
    title:'Judicial Review of Acts of Congress',
    body:'<p><strong>How it works:</strong> The Supreme Court can declare any act of Congress <strong>unconstitutional</strong>, rendering it void. This power of judicial review has been a cornerstone of American constitutional law since <em>Marbury v. Madison</em> (1803).</p><p>Recent examples include the Court striking down key provisions of the <strong>Voting Rights Act</strong> in <em>Shelby County v. Holder</em> (2013), and invalidating the <strong>Affordable Care Act’s</strong> individual mandate penalty in <em>NFIB v. Sebelius</em> (2012) — while narrowly upholding the law overall.</p><div class="callout">Judicial review gives the Court the last word on what the Constitution means — making it the ultimate check on legislative overreach.</div>'
  },
  'jud-exe-review': {
    owner:'jud',
    label:'Judicial Branch → Executive Branch',
    title:'Judicial Review of Executive Orders',
    body:'<p><strong>How it works:</strong> The Supreme Court can strike down executive orders and actions as unconstitutional or as exceeding statutory authority, forcing the President to act within legal limits.</p><p>In <em>Learning Resources, Inc. v. Trump</em> (2026), the Court ruled <strong>6–3</strong> that President Trump’s use of the International Emergency Economic Powers Act (IEEPA) to impose sweeping tariffs exceeded his statutory authority — invalidating over $160 billion in collected tariffs.</p><div class="callout">Chief Justice Roberts wrote that the word “regulate” in IEEPA “cannot bear such weight” as to authorize a full tariff regime — a power the Constitution reserves for Congress.</div>'
  },
};

const PILL = {
  'leg-exe-impeach': 'Impeachment Process',
  'leg-jud-impeach': 'Impeachment Process',
  'leg-exe-override': 'Veto Override',
  'leg-jud-confirm': 'Confirms Justices',
  'exe-leg-veto': 'Veto',
  'exe-jud-nominate': 'Nominates Justices',
  'jud-leg-review': 'Judicial Review',
  'jud-exe-review': 'Judicial Review',
};

let activeId = null;
let mode     = 'learn';
let revealed = new Set();

const panel       = document.getElementById('detailPanel');
const card        = document.getElementById('detailCard');
const detailLabel = document.getElementById('detailLabel');
const detailTitle = document.getElementById('detailTitle');
const detailBody  = document.getElementById('detailBody');
const quizMsg     = document.getElementById('quizMsg');
const hintText    = document.getElementById('hintText');
document.getElementById('closeBtn').addEventListener('click', closeDetail);

function setMode(m) {
  mode = m;
  revealed.clear();
  activeId = null;
  panel.classList.remove('open');
  quizMsg.classList.remove('open');
  document.getElementById('btnLearn').classList.toggle('active', m === 'learn');
  document.getElementById('btnQuiz').classList.toggle('active',  m === 'quiz');
  hintText.textContent = m === 'learn'
    ? '\u2193 Click any arrow to explore that check in depth'
    : '\u2193 Can you name each check? Click an arrow to reveal it';
  resetAll();
}

function pillLabel(id) { return PILL[id] || ''; }

function setArrowState(id, state) {
  const g = document.querySelector('[data-id="' + id + '"]');
  if (!g) return;
  const line    = g.querySelector('.line');
  const pillBg  = g.querySelector('.pill-bg');
  const pillTxt = g.querySelector('.pill-txt');
  const ch      = CHECKS[id];
  const color   = C[ch.owner];
  const isRevealed = revealed.has(id);

  if (state === 'dim') {
    line.setAttribute('stroke-opacity', '0.12');
    line.setAttribute('stroke-width', '2');
    pillBg.setAttribute('opacity', '0.2');
    pillTxt.setAttribute('opacity', '0.25');
    line.setAttribute('marker-end', 'url(#ah-' + ch.owner + ')');
  } else if (state === 'active') {
    line.setAttribute('stroke-opacity', '1');
    line.setAttribute('stroke-width', '3.5');
    pillBg.setAttribute('fill', color);
    pillBg.setAttribute('opacity', '1');
    pillTxt.setAttribute('fill', 'white');
    pillTxt.setAttribute('opacity', '1');
    pillTxt.textContent = pillLabel(id);
    line.setAttribute('marker-end', 'url(#ah-' + ch.owner + '-a)');
    if (id.includes('impeach')) {
      const stem = document.getElementById('impeach-stem');
      if (stem) { stem.setAttribute('stroke-opacity','1'); stem.setAttribute('stroke-width','3.5'); }
    }
  } else if (state === 'hover') {
    line.setAttribute('stroke-opacity', '1');
    line.setAttribute('stroke-width', '3');
    pillBg.setAttribute('fill', color);
    pillBg.setAttribute('opacity', '1');
    pillTxt.setAttribute('fill', 'white');
    pillTxt.setAttribute('opacity', '1');
    if (mode === 'learn' || isRevealed) pillTxt.textContent = pillLabel(id);
    else pillTxt.textContent = '?';
    line.setAttribute('marker-end', 'url(#ah-' + ch.owner + '-a)');
  } else {
    // normal
    line.setAttribute('stroke-opacity', '0.65');
    line.setAttribute('stroke-width', '2.5');
    pillBg.setAttribute('fill', 'white');
    pillBg.setAttribute('opacity', '1');
    pillTxt.setAttribute('fill', color);
    pillTxt.setAttribute('opacity', '1');
    pillTxt.textContent = (mode === 'learn' || isRevealed) ? pillLabel(id) : '?';
    line.setAttribute('marker-end', 'url(#ah-' + ch.owner + ')');
    if (id.includes('impeach')) {
      const stem = document.getElementById('impeach-stem');
      if (stem) { stem.setAttribute('stroke-opacity','0.6'); stem.setAttribute('stroke-width','2.5'); }
    }
  }
}

function resetAll() {
  Object.keys(CHECKS).forEach(id => {
    setArrowState(id, activeId ? (id === activeId ? 'active' : 'dim') : 'normal');
  });
}

document.querySelectorAll('.arrow-group').forEach(function(g) {
  var id = g.getAttribute('data-id');
  g.addEventListener('mouseenter', function() { if (activeId !== id) setArrowState(id, 'hover'); });
  g.addEventListener('mouseleave', function() { if (activeId !== id) setArrowState(id, activeId ? 'dim' : 'normal'); });
  g.addEventListener('click', function(e) {
    e.stopPropagation();
    if (mode === 'quiz') {
      if (revealed.has(id)) {
        // Already revealed — flip back to ?
        revealed.delete(id);
        activeId = null;
        resetAll();
        quizMsg.classList.remove('open');
      } else {
        // Reveal it — show label, keep it until clicked again
        revealed.add(id);
        activeId = id;
        resetAll();
        quizMsg.textContent = '\u2713 ' + pillLabel(id) + '  \u2014  click again to hide';
        quizMsg.className = 'quiz-msg open correct';
      }
      return;
    } else {
      if (activeId === id) { closeDetail(); return; }
      activeId = id;
      resetAll();
      openPanel(id);
    }
  });
});

function openPanel(id) {
  var ch = CHECKS[id];
  detailLabel.textContent = ch.label;
  detailTitle.textContent = ch.title;
  detailBody.innerHTML    = ch.body;
  card.className = 'detail-card ' + ch.owner;
  panel.classList.add('open');
  setTimeout(function() { panel.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 60);
}

function closeDetail() {
  activeId = null;
  resetAll();
  panel.classList.remove('open');
}

// Init pill labels
Object.keys(CHECKS).forEach(function(id) {
  var g = document.querySelector('[data-id="' + id + '"]');
  if (g) g.querySelector('.pill-txt').textContent = pillLabel(id);
});
</script>
</body>
</html>
